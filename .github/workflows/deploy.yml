name: Build & Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # ─── CI: Test Backend ──────────────────────────────────
  test-backend:
    name: Go Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: server/go.sum

      - name: Run Go vet
        run: |
          cd server
          go vet ./...

      - name: Run Go Tests
        run: |
          cd server
          go test -v ./...

  # ─── CI: Test Frontend ─────────────────────────────────
  test-frontend:
    name: Frontend Build & Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: cd client && npm ci

      - name: Build (includes tsc type-checks)
        run: cd client && npm run build

  # ─── Build & Push Docker Images ────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/evolv-server:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/evolv-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push client image
        uses: docker/build-push-action@v6
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/evolv-client:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/evolv-client:${{ github.sha }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy to Hetzner ─────────────────────────────────
  deploy:
    name: Deploy to Hetzner
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Debug Network Connectivity (Port 22)
        run: |
          echo "Testing connectivity to ${{ secrets.VM_HOST }} on port 22..."
          # Use nc (netcat) with a 5 second timeout to check if the port is open
          nc -vz -w 5 ${{ secrets.VM_HOST }} 22 || echo "Port 22 is unreachable!"
          
      - name: Setup SSH Key and Known Hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Add the host to known_hosts to prevent interactive prompt
          # We also set a 10s connection timeout for faster failure feedback
          ssh-keyscan -t rsa,ed25519 -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts || true

      - name: Copy docker-compose.prod.yml to server (Native SCP)
        run: |
          scp -v -o ConnectTimeout=15 -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 docker-compose.prod.yml ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:/opt/evolv/

      - name: Deploy via SSH (Native SSH)
        run: |
          ssh -v -o ConnectTimeout=15 -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'EOF'
            set -e
            DEPLOY_DIR="/opt/evolv"
            cd "$DEPLOY_DIR"

            export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            
            echo "⏳ Waiting for containers to start..."
            sleep 10
            echo "✅ Evolv deployed successfully at $(date)"

            docker image prune -f
            docker images ${{ secrets.DOCKERHUB_USERNAME }}/evolv-server --format "{{.ID}} {{.Tag}}" | grep -v latest | awk '{print $1}' | xargs -r docker rmi -f || true
            docker images ${{ secrets.DOCKERHUB_USERNAME }}/evolv-client --format "{{.ID}} {{.Tag}}" | grep -v latest | awk '{print $1}' | xargs -r docker rmi -f || true
            echo "🧹 Old images cleaned up"
          EOF
