name: Evolv CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  backend-test:
    name: Go Backend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true
          cache-dependency-path: server/go.sum

      - name: Install dependencies
        run: |
          cd server
          go mod download

      - name: Run Go Tests
        run: |
          cd server
          go test -v ./...

      - name: Build Go Application
        run: |
          cd server
          go build -v -o evolv-server .

  frontend-build:
    name: Frontend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install npm dependencies
        run: |
          cd client
          npm ci

      - name: Run Build (includes tsc type-checks)
        run: |
          cd client
          npm run build
