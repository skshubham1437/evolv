server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for faster asset delivery
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml font/woff2;

    # React Router — fall back to index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache immutable hashed static assets for 1 year
    location ~* \.(js|css|woff2|png|jpg|jpeg|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
