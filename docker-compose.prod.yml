services:
  server:
    image: ${DOCKERHUB_USERNAME}/evolv-server:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-https://evolv.shubhamkr.in}
      APP_ENV: production
    ports:
      - "8082:8081"
    networks:
      - evolv-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  client:
    image: ${DOCKERHUB_USERNAME}/evolv-client:latest
    restart: unless-stopped
    ports:
      - "3001:80"
    networks:
      - evolv-net
    depends_on:
      server:
        condition: service_healthy

networks:
  evolv-net:
    driver: bridge
