services:
  server:
    image: ${DOCKERHUB_USERNAME}/evolv-server:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-https://evolv.shubhamkr.in}
      APP_ENV: production
    ports:
      - "8081:8081"
    networks:
      - evolv-net

  client:
    image: ${DOCKERHUB_USERNAME}/evolv-client:latest
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - evolv-net

networks:
  evolv-net:
    driver: bridge
